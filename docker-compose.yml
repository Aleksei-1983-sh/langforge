services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    volumes:
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "testuser", "-d", "testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    build:
      context: .
      dockerfile: docker/ollama/Dockerfile.ollama-mock
    volumes:
      - ollama_models:/var/lib/ollama/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:11434/ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      PGUSER: testuser
      PGPASSWORD: testpass
      PGDATABASE: testdb
      PGHOST: postgres
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434
      OLLAMA_MODEL: "llama3:8b"
    command: ["/app/tests/start_server_old.sh"]
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - web
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    ports:
      - "80:80"

  client:
    image: curlimages/curl:8.5.0
    depends_on:
      - nginx
    entrypoint: ["sh"]
    tty: true
    stdin_open: true

volumes:
  ollama_models:
