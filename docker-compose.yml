#./docker-compose.yml
version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    volumes:
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "testuser", "-d", "testdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    build:
      context: .
      dockerfile: docker/ollama/Dockerfile.ollama-mock
    volumes:
      - ollama_models:/var/lib/ollama/models
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:11434/ping"]
      interval: 30s
      timeout: 5s
      retries: 5

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      PGUSER: testuser
      PGPASSWORD: testpass
      PGDATABASE: testdb
      PGHOST: postgres
      OLLAMA_HOST: ollama
      OLLAMA_PORT: 11434
      OLLAMA_MODEL: "llama3:8b"
    volumes:
      #      - .:/app:cached
      - app_bin:/app/bin
    ports:
      - "1234:1234"
    command: [ "/app/tests/start_server_old.sh" ]
        #    command: ["sleep", "infinity"]
  client:
    image: curlimages/curl:8.5.0
    depends_on:
      - backend
    entrypoint: ["sh"]
    tty: true
    stdin_open: true

volumes:
  app_bin:
  ollama_models:
